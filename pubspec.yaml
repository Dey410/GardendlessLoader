name: gardendless_loader
description: Local Flutter loader for user-supplied PvZ2 Gardendless web resources.
publish_to: "none"
version: 0.4.1+5

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  archive: ^3.6.1
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  font_awesome_flutter: ^11.0.0
  http: ^1.6.0
  package_info_plus: ^10.1.0
  package_info_plus_ohos: ^0.0.7
  path: ^1.9.0
  path_provider: ^2.1.5
  wakelock_plus: ^1.4.0

dev_dependencies:
  flutter_inappwebview_platform_interface: ^1.3.0+1
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  wakelock_plus_platform_interface: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - tool/generated_icons/app_icon_master.png
