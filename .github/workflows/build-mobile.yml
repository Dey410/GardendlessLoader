name: Build Mobile Artifacts

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Install dependencies
        run: |
          rm -f pubspec_overrides.yaml
          flutter pub get

      - name: Test
        run: |
          TEST_FILES=$(find test -name '*_test.dart' ! -name 'harmony_build_config_test.dart' -print)
          flutter test $TEST_FILES

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            {
              echo "storeFile=release.keystore"
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyAlias=$ANDROID_KEY_ALIAS"
              echo "keyPassword=$ANDROID_KEY_PASSWORD"
            } > android/key.properties
          else
            echo "No Android signing secrets configured; using debug signing."
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gardendless-loader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios:
    name: Build unsigned iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Install dependencies
        run: |
          rm -f pubspec_overrides.yaml
          flutter pub get

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios

      - name: Test
        run: |
          TEST_FILES=$(find test -name '*_test.dart' ! -name 'harmony_build_config_test.dart' -print)
          flutter test $TEST_FILES

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r GardendlessLoader-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: gardendless-loader-unsigned-ipa
          path: build/ios/ipa/GardendlessLoader-unsigned.ipa
          if-no-files-found: error

  harmonyos:
    name: Build HarmonyOS HAP
    runs-on: ubuntu-latest

    env:
      OHOS_FLUTTER_SDK_REPOSITORY: https://gitcode.com/openharmony-tpc/flutter_flutter.git
      OHOS_FLUTTER_SDK_REF: oh-3.35.7-release
      OHOS_MIN_DART_VERSION: 3.5.0
      OHOS_COMMANDLINE_TOOLS_URL: ${{ secrets.OHOS_COMMANDLINE_TOOLS_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check OpenHarmony tools configuration
        id: ohos-tools
        run: |
          if [ -z "$OHOS_COMMANDLINE_TOOLS_URL" ]; then
            echo "::notice title=HarmonyOS HAP skipped::Set the OHOS_COMMANDLINE_TOOLS_URL repository secret to build and upload the HAP artifact."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        if: steps.ohos-tools.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up OpenHarmony Flutter SDK
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          rm -rf "$RUNNER_TEMP/flutter_ohos"

          git clone --branch "$OHOS_FLUTTER_SDK_REF" "$OHOS_FLUTTER_SDK_REPOSITORY" "$RUNNER_TEMP/flutter_ohos"

          cd "$RUNNER_TEMP/flutter_ohos"
          git fetch --tags --force
          git config --global --add safe.directory "$RUNNER_TEMP/flutter_ohos"

          echo "$RUNNER_TEMP/flutter_ohos/bin" >> "$GITHUB_PATH"
          echo "FLUTTER_ROOT=$RUNNER_TEMP/flutter_ohos" >> "$GITHUB_ENV"
          echo "PUB_HOSTED_URL=https://pub.flutter-io.cn" >> "$GITHUB_ENV"
          echo "FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn" >> "$GITHUB_ENV"

          "$RUNNER_TEMP/flutter_ohos/bin/flutter" --version
          "$RUNNER_TEMP/flutter_ohos/bin/dart" --version

      - name: Verify OpenHarmony Dart SDK compatibility
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          flutter --version
          dart --version

          dart_version="$(dart --version 2>&1 | sed -E 's/.*Dart SDK version: ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"

          if [ -z "$dart_version" ]; then
            echo "Could not determine Dart version from OpenHarmony Flutter SDK."
            exit 1
          fi

          echo "Detected Dart SDK version: $dart_version"

          if [ "$(printf '%s\n%s\n' "$OHOS_MIN_DART_VERSION" "$dart_version" | sort -V | head -n 1)" != "$OHOS_MIN_DART_VERSION" ]; then
            echo "OpenHarmony Flutter SDK Dart $dart_version is too old; GardendlessLoader requires Dart >=$OHOS_MIN_DART_VERSION."
            echo "Use a newer OpenHarmony Flutter SDK branch."
            exit 1
          fi

      - name: Set up OpenHarmony command-line tools
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/deveco"

          curl -fL "$OHOS_COMMANDLINE_TOOLS_URL" -o "$RUNNER_TEMP/deveco-commandline-tools.zip"

          if [ ! -s "$RUNNER_TEMP/deveco-commandline-tools.zip" ]; then
            echo "Downloaded OpenHarmony command-line tools archive is empty."
            exit 1
          fi

          unzip -q "$RUNNER_TEMP/deveco-commandline-tools.zip" -d "$RUNNER_TEMP/deveco"

          echo "=== Extracted directory structure (depth 5) ==="
          find "$RUNNER_TEMP/deveco" -maxdepth 5 -print | head -120

          # ── 查找 ohpm ────────────────────────────────────────────────────────
          OHPM_BIN="$(find "$RUNNER_TEMP/deveco" -type f \( -name 'ohpm' -o -name 'ohpm.sh' \) -path '*/bin/*' -print -quit || true)"
          if [ -z "$OHPM_BIN" ]; then
            echo "ERROR: Could not find ohpm binary. Listing all files:"
            find "$RUNNER_TEMP/deveco" -maxdepth 8 -name 'ohpm*' -print || true
            exit 1
          fi

          # ── 查找 hvigorw ─────────────────────────────────────────────────────
          HVIGORW_BIN="$(find "$RUNNER_TEMP/deveco" -type f \( -name 'hvigorw' -o -name 'hvigorw.sh' \) -path '*/bin/*' -print -quit || true)"
          if [ -z "$HVIGORW_BIN" ]; then
            echo "ERROR: Could not find hvigorw binary. Listing all files:"
            find "$RUNNER_TEMP/deveco" -maxdepth 8 -name 'hvigor*' -print || true
            exit 1
          fi

          chmod +x "$OHPM_BIN"
          chmod +x "$HVIGORW_BIN"

          OHPM_HOME="$(dirname "$OHPM_BIN")"
          HVIGORW_HOME="$(dirname "$HVIGORW_BIN")"
          echo "$OHPM_HOME"    >> "$GITHUB_PATH"
          echo "$HVIGORW_HOME" >> "$GITHUB_PATH"

          # ── 查找 Node.js ─────────────────────────────────────────────────────
          NODE_BIN="$(find "$RUNNER_TEMP/deveco" -type f -name 'node' -not -path '*/include/*' -print -quit || true)"
          if [ -n "$NODE_BIN" ]; then
            chmod +x "$NODE_BIN"
            NODE_HOME="$(dirname "$NODE_BIN")"
            echo "$NODE_HOME" >> "$GITHUB_PATH"
            echo "NODE_HOME=$NODE_HOME" >> "$GITHUB_ENV"
          fi

          # ── 定位 HOS_SDK_HOME ────────────────────────────────────────────────
          #
          # flutter_ohos 要求 HOS_SDK_HOME 指向一个目录，其直接子目录为纯数字的
          # API level（如 10、11、12），且每个 API level 目录下含有 toolchains/。
          #
          # DevEco CLI zip 包的几种常见结构：
          #   A) sdk/default/openharmony/12/toolchains/
          #   B) sdk/HarmonyOS-NEXT-xxx/openharmony/12/toolchains/
          #   C) sdk/openharmony/12/toolchains/
          #   D) sdk/12/toolchains/
          #
          # 策略：找到含有 toolchains 的数字目录，取其父目录。

          HOS_SDK=""

          # 方法 1：toolchains 路径推导
          while IFS= read -r tc_dir; do
            api_dir="$(dirname "$tc_dir")"
            api_name="$(basename "$api_dir")"
            if echo "$api_name" | grep -qE '^[0-9]+$'; then
              HOS_SDK="$(dirname "$api_dir")"
              break
            fi
          done < <(find "$RUNNER_TEMP/deveco" -type d -name 'toolchains' 2>/dev/null)

          # 方法 2：找名为 openharmony 的目录
          if [ -z "$HOS_SDK" ]; then
            HOS_SDK="$(find "$RUNNER_TEMP/deveco" -type d -name 'openharmony' -print -quit || true)"
          fi

          # 方法 3：找名为 sdk 的目录（保底）
          if [ -z "$HOS_SDK" ]; then
            HOS_SDK="$(find "$RUNNER_TEMP/deveco" -type d -name 'sdk' -print -quit || true)"
          fi

          if [ -z "$HOS_SDK" ] || [ ! -d "$HOS_SDK" ]; then
            echo "ERROR: Could not locate OpenHarmony SDK directory."
            echo "Full directory tree:"
            find "$RUNNER_TEMP/deveco" -maxdepth 10 -print
            exit 1
          fi

          echo "=== Resolved HOS_SDK_HOME ==="
          echo "$HOS_SDK"
          ls "$HOS_SDK"

          echo "HOS_SDK_HOME=$HOS_SDK"    >> "$GITHUB_ENV"
          echo "DEVECO_SDK_HOME=$HOS_SDK" >> "$GITHUB_ENV"

          TOOL_HOME="$(dirname "$OHPM_HOME")"
          echo "TOOL_HOME=$TOOL_HOME" >> "$GITHUB_ENV"

          # npm 镜像
          {
            echo "registry=https://repo.huaweicloud.com/repository/npm/"
            echo "@ohos:registry=https://repo.harmonyos.com/npm/"
          } > ~/.npmrc

          echo "=== Tool versions ==="
          "$OHPM_BIN"    --version || true
          "$HVIGORW_BIN" --version || true

      - name: Verify OpenHarmony build environment
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          echo "=== Environment variables ==="
          echo "HOS_SDK_HOME    = $HOS_SDK_HOME"
          echo "DEVECO_SDK_HOME = $DEVECO_SDK_HOME"
          echo "FLUTTER_ROOT    = $FLUTTER_ROOT"

          echo "=== Required binaries ==="
          command -v ohpm    || { echo "ERROR: ohpm not in PATH"; exit 1; }
          command -v hvigorw || command -v hvigorw.sh || true
          command -v node    || true
          ohpm    --version  || true
          node    --version  || true

          echo "=== SDK directory contents ==="
          if [ ! -d "$HOS_SDK_HOME" ]; then
            echo "ERROR: HOS_SDK_HOME does not exist: $HOS_SDK_HOME"
            exit 1
          fi
          ls -la "$HOS_SDK_HOME"

          echo "=== Flutter ==="
          flutter --version

      - name: Configure Flutter for OpenHarmony SDK
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          # flutter_ohos 分支支持 --ohos-sdk 配置项
          flutter config --ohos-sdk="$HOS_SDK_HOME" 2>/dev/null || true

      - name: Install Flutter dependencies
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          rm -f pubspec_overrides.yaml
          flutter pub get

      - name: Install ohpm dependencies
        if: steps.ohos-tools.outputs.enabled == 'true'
        working-directory: ohos
        run: ohpm install

      - name: Test
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          TEST_FILES=$(find test -name '*_test.dart' ! -name 'harmony_build_config_test.dart' -print)
          flutter test $TEST_FILES

      - name: Build HAP
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: flutter build hap --release --target-platform ohos-arm64

      - name: Locate and stage HAP artifact
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          echo "=== Built .hap files ==="
          find ohos -name '*.hap' -print

          # 优先找签名包，其次找任意 .hap
          HAP_PATH="$(find ohos -name 'entry-default-signed.hap' -print -quit || true)"
          if [ -z "$HAP_PATH" ]; then
            HAP_PATH="$(find ohos -name '*.hap' -print -quit || true)"
          fi

          if [ -z "$HAP_PATH" ]; then
            echo "ERROR: No .hap file found after build."
            exit 1
          fi

          echo "Staging: $HAP_PATH"
          cp "$HAP_PATH" "$RUNNER_TEMP/GardendlessLoader.hap"

      - name: Upload HAP
        if: steps.ohos-tools.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gardendless-loader-hap
          path: ${{ runner.temp }}/GardendlessLoader.hap
          if-no-files-found: error
