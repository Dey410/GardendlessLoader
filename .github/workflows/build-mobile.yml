name: Build Mobile Artifacts

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            {
              echo "storeFile=release.keystore"
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyAlias=$ANDROID_KEY_ALIAS"
              echo "keyPassword=$ANDROID_KEY_PASSWORD"
            } > android/key.properties
          else
            echo "No Android signing secrets configured; using debug signing."
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gardendless-loader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios:
    name: Build unsigned iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios

      - name: Test
        run: flutter test

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r GardendlessLoader-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: gardendless-loader-unsigned-ipa
          path: build/ios/ipa/GardendlessLoader-unsigned.ipa
          if-no-files-found: error

  harmonyos:
    name: Build HarmonyOS HAP
    runs-on: ubuntu-latest

    env:
      OHOS_FLUTTER_SDK_REPOSITORY: https://gitcode.com/openharmony-tpc/flutter_flutter.git
      OHOS_FLUTTER_SDK_REF: oh-3.35.7-release
      OHOS_MIN_DART_VERSION: 3.5.0
      OHOS_COMMANDLINE_TOOLS_URL: ${{ secrets.OHOS_COMMANDLINE_TOOLS_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check OpenHarmony tools configuration
        id: ohos-tools
        run: |
          if [ -z "$OHOS_COMMANDLINE_TOOLS_URL" ]; then
            echo "::notice title=HarmonyOS HAP skipped::Set the OHOS_COMMANDLINE_TOOLS_URL repository secret to build and upload the HAP artifact."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        if: steps.ohos-tools.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up OpenHarmony Flutter SDK
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          rm -rf "$RUNNER_TEMP/flutter_ohos"

          git clone --branch "$OHOS_FLUTTER_SDK_REF" "$OHOS_FLUTTER_SDK_REPOSITORY" "$RUNNER_TEMP/flutter_ohos"

          cd "$RUNNER_TEMP/flutter_ohos"

          git fetch --tags --force
          git config --global --add safe.directory "$RUNNER_TEMP/flutter_ohos"

          echo "$RUNNER_TEMP/flutter_ohos/bin" >> "$GITHUB_PATH"
          echo "FLUTTER_ROOT=$RUNNER_TEMP/flutter_ohos" >> "$GITHUB_ENV"
          echo "PUB_HOSTED_URL=https://pub.flutter-io.cn" >> "$GITHUB_ENV"
          echo "FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn" >> "$GITHUB_ENV"

          "$RUNNER_TEMP/flutter_ohos/bin/flutter" --version
          "$RUNNER_TEMP/flutter_ohos/bin/dart" --version

      - name: Verify OpenHarmony Dart SDK compatibility
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          flutter --version
          dart --version

          dart_version="$(dart --version 2>&1 | sed -E 's/.*Dart SDK version: ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"

          if [ -z "$dart_version" ]; then
            echo "Could not determine Dart version from OpenHarmony Flutter SDK."
            exit 1
          fi

          echo "Detected Dart SDK version: $dart_version"

          if [ "$(printf '%s\n%s\n' "$OHOS_MIN_DART_VERSION" "$dart_version" | sort -V | head -n 1)" != "$OHOS_MIN_DART_VERSION" ]; then
            echo "OpenHarmony Flutter SDK Dart $dart_version is too old; GardendlessLoader requires Dart >=$OHOS_MIN_DART_VERSION."
            echo "Use a newer OpenHarmony Flutter SDK branch."
            exit 1
          fi

      - name: Set up OpenHarmony command-line tools
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/deveco"

          curl -L "$OHOS_COMMANDLINE_TOOLS_URL" -o "$RUNNER_TEMP/deveco-commandline-tools.zip"

          if [ ! -s "$RUNNER_TEMP/deveco-commandline-tools.zip" ]; then
            echo "Downloaded OpenHarmony command-line tools archive is empty."
            exit 1
          fi

          unzip -q "$RUNNER_TEMP/deveco-commandline-tools.zip" -d "$RUNNER_TEMP/deveco"

          TOOL_HOME="$(find "$RUNNER_TEMP/deveco" -type d \( -name command-line-tools -o -name 'DevEco Studio' \) | head -n 1)"

          if [ -z "$TOOL_HOME" ]; then
            echo "Could not locate DevEco command-line tools in downloaded archive."
            exit 1
          fi

          echo "TOOL_HOME=$TOOL_HOME" >> "$GITHUB_ENV"
          echo "DEVECO_SDK_HOME=$TOOL_HOME/sdk" >> "$GITHUB_ENV"

          echo "$TOOL_HOME/tools/ohpm/bin" >> "$GITHUB_PATH"
          echo "$TOOL_HOME/tools/hvigor/bin" >> "$GITHUB_PATH"
          echo "$TOOL_HOME/tools/node/bin" >> "$GITHUB_PATH"

          echo "registry=https://repo.huaweicloud.com/repository/npm/" > ~/.npmrc
          echo "@ohos:registry=https://repo.harmonyos.com/npm/" >> ~/.npmrc

      - name: Install dependencies
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          cp pubspec_overrides.ohos.yaml pubspec_overrides.yaml

          flutter --version
          dart --version

          flutter pub get -v

      - name: Test
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: flutter test

      - name: Build HAP
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: flutter build hap --release --target-platform ohos-arm64

      - name: Upload HAP
        if: steps.ohos-tools.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gardendless-loader-hap
          path: ohos/entry/build/default/outputs/default/entry-default-signed.hap
          if-no-files-found: error
