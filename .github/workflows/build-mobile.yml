name: Build Mobile Artifacts

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Install dependencies
        run: |
          if [ -f pubspec_overrides.yaml ]; then
            mv pubspec_overrides.yaml "$RUNNER_TEMP/pubspec_overrides.yaml.disabled"
          fi
          flutter pub get

      - name: Test
        run: |
          TEST_FILES="$(find test -name '*_test.dart' ! -name 'harmony_build_config_test.dart' -print)"
          if [ -n "$TEST_FILES" ]; then
            flutter test $TEST_FILES
          else
            echo "No Flutter tests found."
          fi

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            {
              echo "storeFile=release.keystore"
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyAlias=$ANDROID_KEY_ALIAS"
              echo "keyPassword=$ANDROID_KEY_PASSWORD"
            } > android/key.properties
          else
            echo "No Android signing secrets configured; using debug signing."
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gardendless-loader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios:
    name: Build unsigned iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          cache: true

      - name: Install dependencies
        run: |
          if [ -f pubspec_overrides.yaml ]; then
            mv pubspec_overrides.yaml "$RUNNER_TEMP/pubspec_overrides.yaml.disabled"
          fi
          flutter pub get

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios

      - name: Test
        run: |
          TEST_FILES="$(find test -name '*_test.dart' ! -name 'harmony_build_config_test.dart' -print)"
          if [ -n "$TEST_FILES" ]; then
            flutter test $TEST_FILES
          else
            echo "No Flutter tests found."
          fi

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r GardendlessLoader-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: gardendless-loader-unsigned-ipa
          path: build/ios/ipa/GardendlessLoader-unsigned.ipa
          if-no-files-found: error

  harmonyos:
    name: Build unsigned HarmonyOS HAP
    runs-on: ubuntu-latest

    env:
      OHOS_FLUTTER_SDK_REPOSITORY: https://gitcode.com/openharmony-tpc/flutter_flutter.git
      OHOS_FLUTTER_SDK_REF: oh-3.35.7-release
      OHOS_MIN_DART_VERSION: 3.5.0
      OHOS_COMMANDLINE_TOOLS_URL: ${{ secrets.OHOS_COMMANDLINE_TOOLS_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check OpenHarmony tools configuration
        id: ohos-tools
        run: |
          if [ -z "$OHOS_COMMANDLINE_TOOLS_URL" ]; then
            echo "::notice title=HarmonyOS HAP skipped::Set the OHOS_COMMANDLINE_TOOLS_URL repository secret to build and upload the HAP artifact."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        if: steps.ohos-tools.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up OpenHarmony Flutter SDK
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          FLUTTER_OHOS_DIR="$RUNNER_TEMP/flutter_ohos_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"

          git clone --branch "$OHOS_FLUTTER_SDK_REF" "$OHOS_FLUTTER_SDK_REPOSITORY" "$FLUTTER_OHOS_DIR"
          cd "$FLUTTER_OHOS_DIR"

          git fetch --tags --force
          git config --global --add safe.directory "$FLUTTER_OHOS_DIR"

          echo "$FLUTTER_OHOS_DIR/bin" >> "$GITHUB_PATH"
          echo "FLUTTER_ROOT=$FLUTTER_OHOS_DIR" >> "$GITHUB_ENV"
          echo "PUB_HOSTED_URL=https://pub.flutter-io.cn" >> "$GITHUB_ENV"
          echo "FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn" >> "$GITHUB_ENV"
          echo "PUB_CACHE=$RUNNER_TEMP/pub-cache" >> "$GITHUB_ENV"

          "$FLUTTER_OHOS_DIR/bin/flutter" --version
          "$FLUTTER_OHOS_DIR/bin/dart" --version

      - name: Verify OpenHarmony Dart SDK compatibility
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          flutter --version
          dart --version

          dart_version="$(dart --version 2>&1 | sed -E 's/.*Dart SDK version: ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"

          if [ -z "$dart_version" ]; then
            echo "Could not determine Dart version from OpenHarmony Flutter SDK."
            exit 1
          fi

          echo "Detected Dart SDK version: $dart_version"

          if [ "$(printf '%s\n%s\n' "$OHOS_MIN_DART_VERSION" "$dart_version" | sort -V | head -n 1)" != "$OHOS_MIN_DART_VERSION" ]; then
            echo "OpenHarmony Flutter SDK Dart $dart_version is too old; GardendlessLoader requires Dart >=$OHOS_MIN_DART_VERSION."
            echo "Use a newer OpenHarmony Flutter SDK branch."
            exit 1
          fi

      - name: Set up OpenHarmony command-line tools
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          DEVECO_DIR="$RUNNER_TEMP/deveco_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"

          mkdir -p "$DEVECO_DIR"
          curl -L "$OHOS_COMMANDLINE_TOOLS_URL" -o "$RUNNER_TEMP/deveco-commandline-tools.zip"

          if [ ! -s "$RUNNER_TEMP/deveco-commandline-tools.zip" ]; then
            echo "Downloaded OpenHarmony command-line tools archive is empty."
            exit 1
          fi

          unzip -q "$RUNNER_TEMP/deveco-commandline-tools.zip" -d "$DEVECO_DIR"

          TOOL_HOME="$(find "$DEVECO_DIR" -type d -name command-line-tools -print -quit)"
          if [ -z "$TOOL_HOME" ]; then
            echo "Could not locate command-line-tools in downloaded archive."
            find "$DEVECO_DIR" -maxdepth 4 -type d | sort
            exit 1
          fi

          OHPM_BIN="$(find "$TOOL_HOME" -type f -name ohpm -print -quit)"
          HVIGOR_BIN="$(find "$TOOL_HOME" -type f \( -name hvigor -o -name hvigorw \) -print -quit)"
          NODE_BIN="$(command -v node || true)"

          if [ -z "$OHPM_BIN" ]; then
            echo "Could not locate ohpm in downloaded archive."
            find "$TOOL_HOME" -maxdepth 4 -type f | sort
            exit 1
          fi

          if [ -z "$HVIGOR_BIN" ]; then
            echo "Could not locate hvigor or hvigorw in downloaded archive."
            find "$TOOL_HOME" -maxdepth 4 -type f | sort
            exit 1
          fi

          if [ -z "$NODE_BIN" ]; then
            echo "Could not locate node on runner."
            exit 1
          fi

          OHPM_DIR="$(dirname "$OHPM_BIN")"
          HVIGOR_DIR="$(dirname "$HVIGOR_BIN")"
          NODE_DIR="$(dirname "$NODE_BIN")"

          chmod +x "$OHPM_BIN" "$HVIGOR_BIN" || true

          mkdir -p "$RUNNER_TEMP/ohos-bin"

          if [ "$(basename "$HVIGOR_BIN")" = "hvigorw" ]; then
            ln -sf "$HVIGOR_BIN" "$RUNNER_TEMP/ohos-bin/hvigor"
          fi

          echo "$RUNNER_TEMP/ohos-bin" >> "$GITHUB_PATH"
          echo "$OHPM_DIR" >> "$GITHUB_PATH"
          echo "$HVIGOR_DIR" >> "$GITHUB_PATH"
          echo "$NODE_DIR" >> "$GITHUB_PATH"

          echo "TOOL_HOME=$TOOL_HOME" >> "$GITHUB_ENV"
          echo "DEVECO_SDK_HOME=$TOOL_HOME/sdk" >> "$GITHUB_ENV"
          echo "OHOS_SDK_HOME=$TOOL_HOME/sdk" >> "$GITHUB_ENV"

          export PATH="$RUNNER_TEMP/ohos-bin:$OHPM_DIR:$HVIGOR_DIR:$NODE_DIR:$PATH"

          echo "registry=https://repo.huaweicloud.com/repository/npm/" > ~/.npmrc
          echo "@ohos:registry=https://repo.harmonyos.com/npm/" >> ~/.npmrc

          ohpm --version
          hvigor --version || hvigorw --version
          node --version

      - name: Install dependencies
        if: steps.ohos-tools.outputs.enabled == 'true'
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: |
          mkdir -p "$PUB_CACHE"

          cp pubspec_overrides.ohos.yaml pubspec_overrides.yaml

          git lfs install --skip-smudge || true
          git config --global filter.lfs.smudge "git-lfs smudge --skip -- %f" || true
          git config --global filter.lfs.process "git-lfs filter-process --skip" || true

          flutter --version
          dart --version
          flutter pub get

      - name: Test
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          TEST_FILES="$(find test -name '*_test.dart' ! -name 'harmony_build_config_test.dart' -print)"
          if [ -n "$TEST_FILES" ]; then
            flutter test $TEST_FILES
          else
            echo "No Flutter tests found."
          fi

      - name: Build unsigned HAP
        if: steps.ohos-tools.outputs.enabled == 'true'
        run: |
          set +e
          flutter build hap --release --target-platform ohos-arm64
          FLUTTER_BUILD_STATUS="$?"
          set -e

          echo "flutter build hap exit code: $FLUTTER_BUILD_STATUS"

          UNSIGNED_HAP="$(find ohos/entry/build -type f -name '*unsigned*.hap' -print -quit || true)"

          if [ -z "$UNSIGNED_HAP" ]; then
            echo "Unsigned HAP was not generated."
            echo "Available HAP outputs:"
            find ohos/entry/build -type f -name '*.hap' -print || true
            exit 1
          fi

          mkdir -p build/ohos/unsigned
          cp "$UNSIGNED_HAP" build/ohos/unsigned/GardendlessLoader-unsigned.hap

          echo "Unsigned HAP: $UNSIGNED_HAP"

      - name: Upload unsigned HAP
        if: steps.ohos-tools.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gardendless-loader-unsigned-hap
          path: build/ohos/unsigned/GardendlessLoader-unsigned.hap
          if-no-files-found: error
